<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проекты - ОАЗ</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <!-- НАВИГАЦИЯ -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="../index.html">
                <i class="fas fa-water" style="color: #A0CDFF;"></i> ОА<span>З</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="../index.html">Главная</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="projects.html">Проекты</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="donate.html">Благотворительность</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="catalog.html">Новости</a>
                    </li>
                </ul>
                <ul class="navbar-nav" id="authNav">
                    <li class="nav-item">
                        <a class="nav-link" href="login.html">
                            <i class="fas fa-sign-in-alt"></i> Вход/Регистрация
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- ПРОЕКТЫ -->
    <section class="projects-section">
        <div class="container">
            <h2 class="section-title">Проекты</h2>
            
            <!-- Фильтры -->
            <div class="filter-tabs">
                <button class="filter-tab active" data-filter="all">Все</button>
                <button class="filter-tab" data-filter="active">Текущие</button>
                <button class="filter-tab" data-filter="planned">Запланированные</button>
                <button class="filter-tab" data-filter="completed">Завершенные</button>
            </div>
            
            <!-- Сетка проектов -->
            <div class="row" id="projectsGrid">
                <!-- Проекты загружаются через JavaScript -->
            </div>
        </div>
    </section>

    <!-- Модальное окно подтверждения -->
    <div class="modal fade" id="confirmModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Подтверждение</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p id="confirmMessage">Вы уверены, что хотите присоединиться к проекту?</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button type="button" class="btn btn-primary" id="confirmBtn" style="background-color: #F7567C; border: none;">Да</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- API Client -->
    <script src="./static/js/api-client.js"></script>
    <!-- Custom JS -->
    <script src="./static/js/main.js"></script>
    <script src="./static/js/projects.js"></script>
</body>
</html>
